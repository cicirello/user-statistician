query($owner: String!) {
  user(login: $owner) {
    followers {
      totalCount
    }
    following {
      totalCount
    }
    issues(first: 1) {
      totalCount
    }
    login
    name
    pullRequests(first: 1) {
      totalCount
    }
    repositoriesContributedTo(first: 1) {
      totalCount
    }
    sponsorshipsAsMaintainer {
      totalCount
    }
    sponsorshipsAsSponsor  {
      totalCount
    }
  }
}
