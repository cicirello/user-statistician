query($owner: String!) {
  user(login: $owner) {
    followers {
      totalCount
    }
    following {
      totalCount
    }
    issues {
      totalCount
    }
    login
    name
    pullRequests {
      totalCount
    }
    repositoriesContributedTo {
      totalCount
    }
    sponsorshipsAsMaintainer {
      totalCount
    }
    sponsorshipsAsSponsor  {
      totalCount
    }
  }
}
