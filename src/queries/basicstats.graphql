query($owner: String!) {
  user(login: $owner) {
    followers(first: 1) {
      totalCount
    }
    following(first: 1) {
      totalCount
    }
    issues(first: 1) {
      totalCount
    }
    login
    name
    pullRequests(first: 1) {
      totalCount
    }
    repositoriesContributedTo(first: 1) {
      totalCount
    }
    sponsorshipsAsMaintainer(first: 1) {
      totalCount
    }
    sponsorshipsAsSponsor(first: 1)  {
      totalCount
    }
  }
}
